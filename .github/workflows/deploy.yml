name: Deploy Next.js site to Pages

on:
    push:
        branches: [master]

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v3
              with:
                  version: latest

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "pnpm" # ✅ npm o'rniga pnpm

            - name: Install dependencies
              run: pnpm install # ✅ npm ci o'rniga

            - name: Build Next.js
              run: pnpm build # ✅ npm run build o'rniga

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: ./out # ✅ static export output

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
